<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── Colour tokens ───────────────────────────────── */
:root {
  /* Reds */
  --red-deep:    #3D0A14;
  --red-burgundy:#7B1D2E;
  --red-garnet:  #B5293C;
  --red-terra:   #D4736B;
  --red-blush:   #EEC4BC;
  /* Golds */
  --gold-dark:   #2C1F0A;
  --gold-bronze: #8C6B2E;
  --gold-champ:  #C4963A;
  --gold-warm:   #E8C87A;
  /* Neutrals */
  --n-ebony:     #1E1410;
  --n-walnut:    #4A3530;
  --n-stone:     #9C8A82;
  --n-linen:     #EDE4DC;
  /* Accents */
  --amethyst:    #8880B0;
  --sage:        #50A078;
  --steel:       #5A8CC8;
  /* Section colours */
  --c-daily:    #B5293C;
  --c-goals:    #9B2335;
  --c-habits:   #50A078;
  --c-budget:   #C4963A;
  --c-bible:    #8880B0;
  --c-affirm:   #D4736B;
  --c-cal:      #7A9E9F;
  --c-meet:     #5A8CC8;
  /* Glass */
  --glass-bg:         rgba(255,255,255,0.06);
  --glass-bg-strong:  rgba(255,255,255,0.10);
  --glass-border:     rgba(255,255,255,0.12);
  --glass-border-str: rgba(255,255,255,0.20);
  /* Text */
  --text-primary:   rgba(255,255,255,0.92);
  --text-secondary: rgba(255,255,255,0.60);
  --text-muted:     rgba(255,255,255,0.38);
  /* Legacy aliases (used throughout JSX) */
  --bg:    #131823;
  --sf:    rgba(255,255,255,0.06);
  --s2:    rgba(255,255,255,0.04);
  --s3:    rgba(255,255,255,0.09);
  --card:  rgba(255,255,255,0.06);
  --cream: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.42);
  --bdr:   rgba(255,255,255,0.12);
  --ok:    #50A078;
  --danger:#B5293C;
  /* Default section accent */
  --sec:  #B5293C;
  --sec2: #C4963A;
  --acc:  var(--sec);
  --acc2: var(--sec2);
  --gold: #C4963A;
  --gold2:#E8C87A;
}

/* ── Per-tab section overrides ───────────────────── */
.tab-daily  { --sec:#B5293C; --sec2:#D4736B; }
.tab-goals  { --sec:#9B2335; --sec2:#B5293C; }
.tab-habits { --sec:#50A078; --sec2:#7AC8A0; }
.tab-budget { --sec:#C4963A; --sec2:#E8C87A; }
.tab-bible  { --sec:#8880B0; --sec2:#A89CCF; }
.tab-affirm { --sec:#D4736B; --sec2:#EEC4BC; }
.tab-cal    { --sec:#7A9E9F; --sec2:#9ABCBD; }
.tab-meet   { --sec:#5A8CC8; --sec2:#82AADE; }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;transition:background .5s ease}
#root{display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── Header ──────────────────────────────────────── */
.hdr{
  background:rgba(12,8,6,0.88);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.09);
  padding:11px 16px 9px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.hdr-t{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;color:var(--text-primary);
  font-weight:600;letter-spacing:.14em;text-transform:uppercase;
}
.hdr-r{display:flex;align-items:center;gap:8px}
.chips{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.chip{
  background:rgba(196,150,58,0.14);
  border:1px solid rgba(196,150,58,0.28);
  border-radius:20px;padding:2px 8px;
  font-size:.62rem;color:var(--gold-warm);font-weight:600;
  white-space:nowrap;letter-spacing:.06em;
}

/* ── Sync dot ─────────────────────────────────────── */
.syncdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:background .3s}
.syncdot.synced{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.syncdot.syncing{background:var(--gold-champ);animation:pulse 1s infinite}
.syncdot.error{background:var(--danger)}
.syncdot.offline{background:rgba(255,255,255,0.25)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Background theme picker ──────────────────────── */
.bg-picker{
  display:flex;gap:6px;padding:10px 16px 6px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(0,0,0,0.2);
}
.bg-btn{
  flex:1;height:36px;border-radius:8px;
  border:1.5px solid transparent;
  cursor:pointer;display:flex;align-items:flex-end;padding:4px 7px;
  transition:border-color .2s;
}
.bg-btn span{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);font-weight:500}
.bg-btn.active{border-color:rgba(255,255,255,0.55)}

/* ── Main ─────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.sec{padding:14px}

/* ── Nav ──────────────────────────────────────────── */
.bnav{
  display:flex;
  background:rgba(12,8,6,0.90);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.bnav::-webkit-scrollbar{display:none}
.nbtn{
  flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:7px 6px;
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.32);font-family:'DM Sans',sans-serif;
  font-size:.54rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  transition:color .2s;
}
.nbtn.on{color:var(--text-primary)}
.nico{font-size:1.1rem;line-height:1}
.nbtn.on .nico{
  filter:drop-shadow(0 0 5px currentColor);
}

/* Coloured active indicator per tab */
.nbtn.on.nav-daily  { color:#B5293C; }
.nbtn.on.nav-goals  { color:#9B2335; }
.nbtn.on.nav-habits { color:#50A078; }
.nbtn.on.nav-budget { color:#C4963A; }
.nbtn.on.nav-bible  { color:#8880B0; }
.nbtn.on.nav-affirm { color:#D4736B; }
.nbtn.on.nav-cal    { color:#7A9E9F; }
.nbtn.on.nav-meet   { color:#5A8CC8; }

/* ── Glass cards ──────────────────────────────────── */
.card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:14px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  padding:14px;margin-bottom:11px;
}

/* ── Progress ─────────────────────────────────────── */
.pwrap{background:rgba(255,255,255,0.09);border-radius:99px;height:5px;overflow:hidden;margin:7px 0}
.pbar{height:100%;background:linear-gradient(90deg,var(--sec),var(--sec2));border-radius:99px;transition:width .4s}
.plbl{font-size:.68rem;color:var(--muted);display:flex;justify-content:space-between;letter-spacing:.05em}

/* ── Section title ────────────────────────────────── */
.ctitle{
  font-family:'Cormorant Garamond',serif;
  font-size:.88rem;color:var(--sec2);
  font-weight:600;margin-bottom:11px;
  display:flex;align-items:center;gap:7px;
  letter-spacing:.14em;text-transform:uppercase;
}

/* ── Todo ─────────────────────────────────────────── */
.titem{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);animation:fi .2s ease}
.titem:last-child{border-bottom:none}
.tchk{width:20px;height:20px;border-radius:6px;border:2px solid var(--sec);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .2s}
.tchk.on{background:var(--sec);border-color:var(--sec)}
.ttxt{flex:1;font-size:.88rem;line-height:1.4;cursor:pointer}
.ttxt.done{text-decoration:line-through;color:var(--muted)}
.ttag{font-size:.63rem;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:99px;padding:1px 7px;color:var(--sec2);margin-top:2px;display:inline-block;letter-spacing:.05em}
.tdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;padding:2px 5px;opacity:.5;line-height:1}
.tdel:hover{opacity:1;color:var(--danger)}

/* ── Inputs ───────────────────────────────────────── */
.row{display:flex;gap:7px;margin-top:10px}
.inp{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:8px;padding:10px 11px;
  color:var(--cream);font-family:'DM Sans',sans-serif;
  font-size:.88rem;outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--sec)}
.inp::placeholder{color:var(--muted)}
.inp-sm{padding:8px 10px;font-size:.82rem}
textarea.inp{resize:vertical;min-height:78px;line-height:1.5}
select.inp option{background:#1E1410}

.btn{
  background:var(--sec);color:#fff;border:none;
  border-radius:8px;padding:10px 15px;
  font-family:'DM Sans',sans-serif;font-weight:600;
  font-size:.85rem;cursor:pointer;transition:all .2s;flex-shrink:0;
  letter-spacing:.04em;
}
.btn:hover{opacity:.85}
.btng{background:rgba(255,255,255,0.07);color:var(--cream);border:1px solid var(--glass-border)}
.btng:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.22)}
.btnsm{padding:6px 11px;font-size:.75rem;letter-spacing:.05em}
.btnfull{width:100%}

/* ── Tabs ─────────────────────────────────────────── */
.stabs{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap}
.stab{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:20px;padding:5px 13px;
  font-size:.72rem;cursor:pointer;
  color:var(--muted);font-family:'DM Sans',sans-serif;
  transition:all .2s;letter-spacing:.07em;text-transform:uppercase;
}
.stab.on{background:var(--sec);border-color:var(--sec);color:#fff;font-weight:600}

/* ── Goals ────────────────────────────────────────── */
.gitem{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.gitem:last-child{border-bottom:none}
.mbdg{font-size:.61rem;border-radius:99px;padding:2px 7px;border:1px solid;display:inline-block;margin-top:3px;letter-spacing:.05em}
.mbdg.y{color:var(--ok);border-color:var(--ok);background:rgba(80,160,120,.10)}
.mbdg.n{color:var(--muted);border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04)}

/* ── Date nav ─────────────────────────────────────── */
.dnav{display:flex;align-items:center;gap:9px}
.dnbtn{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:6px;padding:5px 10px;
  color:var(--cream);cursor:pointer;font-size:.9rem;line-height:1;
  transition:background .15s;
}
.dnbtn:hover{background:rgba(255,255,255,0.12)}
.dlbl{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--sec2);flex:1;text-align:center;letter-spacing:.08em}

/* ── Day stats ────────────────────────────────────── */
.dstats{display:flex;gap:9px;margin-bottom:13px}
.dstat{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:10px;padding:9px;text-align:center;min-width:0;
  backdrop-filter:blur(8px);
}
.dsnum{font-family:'Cormorant Garamond',serif;font-size:1.55rem;color:var(--sec2);line-height:1}
.dslbl{font-size:.58rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.1em}

/* ── Quote ────────────────────────────────────────── */
.gquote{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--sec2);font-size:.95rem;text-align:center;
  padding:11px;border-left:2px solid var(--sec);
  margin-bottom:13px;background:rgba(255,255,255,0.04);
  border-radius:0 10px 10px 0;
  backdrop-filter:blur(8px);letter-spacing:.02em;
}

/* ── Affirmations ─────────────────────────────────── */
.aitem{display:flex;gap:9px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.aitem:last-child{border-bottom:none}
.anum{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--sec);opacity:.7;width:22px;flex-shrink:0}
.atxt{flex:1;font-size:.88rem;line-height:1.4}

/* ── Calendar ─────────────────────────────────────── */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:11px}
.cdname{text-align:center;font-size:.58rem;color:var(--muted);padding:3px 0;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.cday{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.78rem;cursor:pointer;position:relative;transition:background .15s}
.cday:hover{background:rgba(255,255,255,0.09)}
.cday.today{background:var(--sec);color:#fff;font-weight:700}
.cday.sel:not(.today){background:rgba(255,255,255,0.08);font-weight:600;outline:1px solid var(--sec)}
.cday.hase::after{content:'';position:absolute;bottom:2px;width:3px;height:3px;border-radius:50%;background:var(--sec2)}
.cday.today.hase::after{background:rgba(255,255,255,0.6)}
.cday.oth{color:var(--muted);opacity:.25;pointer-events:none}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cmo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--sec2);letter-spacing:.08em}
.evitem{display:flex;gap:9px;align-items:flex-start;padding:9px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:5px;border-left:3px solid var(--sec)}
.evtime{font-size:.73rem;color:var(--sec2);font-weight:600;white-space:nowrap;min-width:55px;letter-spacing:.05em}
.evtit{flex:1;font-size:.86rem}
.evdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.88rem;opacity:.6}
.evdel:hover{opacity:1;color:var(--danger)}

/* ── Meeting ──────────────────────────────────────── */
.swgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.swcard{background:rgba(255,255,255,0.05);border-radius:10px;padding:9px;border:1px solid rgba(255,255,255,0.08)}
.swlbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;font-weight:600}
textarea.swinp{width:100%;background:transparent;border:none;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.81rem;resize:none;outline:none;min-height:58px;line-height:1.5}

/* ── Modal / overlay ──────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.80);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.modal{
  background:rgba(22,15,12,0.95);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:14px 14px 10px 10px;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:18px;
  backdrop-filter:blur(24px);
}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--sec2);margin-bottom:14px;letter-spacing:.1em;text-transform:uppercase}
.macts{display:flex;gap:7px;margin-top:13px}

/* ── Form ─────────────────────────────────────────── */
.flbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px;font-weight:600;display:block}
.frow{margin-bottom:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}

/* ── Planning banner ──────────────────────────────── */
.pbanner{border-radius:10px;padding:9px 13px;margin-bottom:11px;display:flex;align-items:flex-start;gap:9px}
.pbanner.plan{background:rgba(181,41,60,0.10);border:1px solid rgba(181,41,60,0.28)}
.pbanner.lock{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09)}
.pb-ico{font-size:1rem;flex-shrink:0;margin-top:1px}
.pb-hd{font-size:.7rem;font-weight:600;margin-bottom:2px;letter-spacing:.08em;text-transform:uppercase}
.pb-hd.gld{color:var(--gold-warm)}.pb-hd.mu{color:var(--muted)}
.pb-bd{font-size:.72rem;color:var(--muted);line-height:1.4}

/* ── Misc ─────────────────────────────────────────── */
.empty{text-align:center;padding:24px 14px;color:var(--muted)}
.eico{font-size:1.8rem;margin-bottom:7px}.etxt{font-size:.83rem;letter-spacing:.04em}
.hint{font-size:.72rem;margin-top:5px;letter-spacing:.04em}
.hint.ok{color:var(--ok)}.hint.mu{color:var(--muted)}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px}

/* ── Setup screen ─────────────────────────────────── */
.setup{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
.setup-t{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--gold-warm);margin-bottom:6px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.setup-s{font-size:.85rem;color:var(--muted);margin-bottom:28px;line-height:1.7;max-width:300px;letter-spacing:.03em}
.setup-f{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}

/* ── Sync setup ───────────────────────────────────── */
.step{display:flex;gap:11px;margin-bottom:16px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--red-garnet);color:#fff;font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-title{font-weight:600;font-size:.88rem;margin-bottom:4px;color:var(--cream);letter-spacing:.04em}
.step-desc{font-size:.8rem;color:var(--muted);line-height:1.5;margin-bottom:6px}
.code-box{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:9px 11px;font-family:monospace;font-size:.72rem;color:var(--gold-warm);line-height:1.6;white-space:pre-wrap;word-break:break-all;cursor:pointer;position:relative}
.code-box:hover::after{content:'tap to copy';position:absolute;top:4px;right:6px;font-size:.6rem;color:var(--muted);font-family:'DM Sans',sans-serif}
.copied{color:var(--ok) !important}
.sync-status-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;margin-bottom:12px}
.sync-status-row.synced{background:rgba(80,160,120,.08);border:1px solid rgba(80,160,120,.2)}
.sync-status-row.error{background:rgba(181,41,60,.08);border:1px solid rgba(181,41,60,.2)}
.sync-status-row.offline{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10)}
.sync-status-row.syncing{background:rgba(196,150,58,.06);border:1px solid rgba(196,150,58,.2)}
.divider{height:1px;background:rgba(255,255,255,0.08);margin:16px 0}

/* ── Habit tracker ────────────────────────────────── */
.hab-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px 8px}
.hab-tbl{border-collapse:collapse;font-size:.7rem;white-space:nowrap}
.hab-name{text-align:left;padding:5px 8px 5px 0;font-size:.75rem;color:var(--cream);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:sticky;left:0;background:rgba(22,15,12,0.95);z-index:2}
.hab-dh{text-align:center;padding:2px 1px;font-size:.58rem;color:var(--muted);min-width:20px}
.hab-wh{text-align:center;font-size:.58rem;color:var(--sec2);font-weight:600;padding:2px 3px;border-bottom:1px solid rgba(255,255,255,0.08);letter-spacing:.07em;text-transform:uppercase}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

/* ─── helpers ─── */
const fmt = d => { if(!d) return ''; const x = d instanceof Date ? d : new Date(d + 'T12:00:00'); return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0'); };
const todayStr = () => fmt(new Date());
const genId = () => Math.random().toString(36).slice(2,9);
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const calcDay   = s => { const a=new Date(s); a.setHours(0,0,0,0); const b=new Date(); b.setHours(0,0,0,0); return Math.max(1,Math.floor((b-a)/86400000)+1); };
const getSundayOf = d => { const dt=new Date(typeof d==='string'?d+'T12:00:00':d); const dow=dt.getDay(); dt.setDate(dt.getDate()-dow); dt.setHours(12,0,0,0); return dt; };
const calcWeek  = start => { const sm=getSundayOf(start); const tm=getSundayOf(new Date()); return Math.max(1,Math.floor((tm-sm)/604800000)+1); };
const weekNumOf = (start,dateStr) => { const sm=getSundayOf(start); const dm=getSundayOf(dateStr); return Math.max(1,Math.floor((dm-sm)/604800000)+1); };
const weekDays = (start,wk) => { const sm=getSundayOf(start); const mon=new Date(sm); mon.setDate(sm.getDate()+(wk-1)*7); return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return fmt(d); }); };
const calcMonth = s => { const a=new Date(s+'T12:00:00'), b=new Date(); return Math.max(1,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+1); };
const calcYear  = d => Math.max(1,Math.ceil(d/365));
const isMeas    = t => /\b\d+\b|pages?|mins?|minutes?|hours?|times?|days?|chapters?|verses?|km|miles?|reps?|sessions?|books?|calls?|words?|percent|%/i.test(t);

const nearestSunToMonthEnd = (yr, mo) => {
  const last=new Date(yr,mo+1,0); const dow=last.getDay();
  const back=dow, fwd=dow===0?0:7-dow;
  const d=back<=fwd?new Date(yr,mo,last.getDate()-back):new Date(yr,mo,last.getDate()+fwd);
  return fmt(d);
};

/* ─── Background themes ─── */
const BG_THEMES = [
  { id:'midnight', label:'Night',   bg:'#131823' },
  { id:'western',  label:'Ember',   bg:'#1E110A' },
  { id:'crimson',  label:'Crimson', bg:'#180808' },
  { id:'alpine',   label:'Alpine',  bg:'#0D1518' },
];

/* ─── Section colors ─── */
const SEC = {
  daily:  '#B5293C',
  goals:  '#9B2335',
  habits: '#50A078',
  budget: '#C4963A',
  bible:  '#8880B0',
  affirm: '#D4736B',
  cal:    '#7A9E9F',
  meet:   '#5A8CC8',
};
const SEC2 = {
  daily:  '#D4736B',
  goals:  '#B5293C',
  habits: '#7AC8A0',
  budget: '#E8C87A',
  bible:  '#A89CCF',
  affirm: '#EEC4BC',
  cal:    '#9ABCBD',
  meet:   '#82AADE',
};

/* ─── Supabase sync engine ─── */
const Sync = (() => {
  let _client = null, _status = 'offline', _listeners = [], _timer = null, _pending = {};
  const notify = s => { _status=s; _listeners.forEach(fn=>fn(s)); };
  const onStatus = fn => { _listeners.push(fn); return ()=>{ _listeners=_listeners.filter(f=>f!==fn); }; };
  const getStatus = () => _status;
  const isReady = () => !!_client;
  const SQL = `-- Run this once in Supabase > SQL Editor
create table if not exists journey_data (
  key text primary key,
  val text not null,
  updated_at timestamptz default now()
);
alter table journey_data enable row level security;
create policy "anon_all" on journey_data
  for all to anon using (true) with check (true);`;
  const loadSupabase = () => new Promise((resolve, reject) => {
    if(window.supabase) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  const init = async (url, key) => {
    try { await loadSupabase(); _client = window.supabase.createClient(url, key); notify('syncing'); await pullAll(); return true; }
    catch(e) { _client = null; notify('error'); return false; }
  };
  const pullAll = async () => {
    if(!_client) return;
    try {
      notify('syncing');
      const {data, error} = await _client.from('journey_data').select('key,val');
      if(error) { notify('error'); return; }
      (data||[]).forEach(row => { try { localStorage.setItem('jny_'+row.key, row.val); } catch {} });
      notify('synced');
    } catch { notify('error'); }
  };
  const scheduleUpsert = (key, val) => {
    if(!_client) return; _pending[key] = val;
    clearTimeout(_timer); _timer = setTimeout(flush, 1500);
  };
  const flush = async () => {
    if(!_client || !Object.keys(_pending).length) return;
    const rows = Object.entries(_pending).map(([key,val])=>({key,val,updated_at:new Date().toISOString()}));
    _pending = {}; notify('syncing');
    try { const {error} = await _client.from('journey_data').upsert(rows); notify(error?'error':'synced'); }
    catch { notify('error'); }
  };
  return {init, pullAll, scheduleUpsert, onStatus, getStatus, isReady, SQL};
})();

/* ─── local storage DB ─── */
const DB = {
  get(k, fallback=null){ try { const r=localStorage.getItem('jny_'+k); return r!==null?JSON.parse(r):fallback; } catch { return fallback; } },
  set(k, v){ const s=JSON.stringify(v); try { localStorage.setItem('jny_'+k, s); } catch {} Sync.scheduleUpsert(k, s); }
};

/* ─── shared ui ─── */
function PBar({pct,label}){
  const p=Math.min(100,Math.max(0,pct||0));
  return(<div><div className="pwrap"><div className="pbar" style={{width:p+'%'}}/></div>
    <div className="plbl"><span>{label}</span><span>{Math.round(p)}%</span></div></div>);
}
function DateNav({date,setDate,maxToday}){
  const isMax=maxToday&&date>=todayStr();
  const lbl=date===todayStr()?'Today':new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  const go=dir=>{ const d=new Date(date+'T12:00:00'); d.setDate(d.getDate()+dir); setDate(fmt(d)); };
  return(<div className="card" style={{padding:'9px 13px',marginBottom:11}}>
    <div className="dnav">
      <button className="dnbtn" onClick={()=>go(-1)}>‹</button>
      <div className="dlbl">{lbl}</div>
      <button className="dnbtn" onClick={()=>go(1)} disabled={!!isMax} style={{opacity:isMax?.35:1}}>›</button>
    </div></div>);
}

/* ─── Sync Setup Modal ─── */
function SyncModal({onClose, onSynced}){
  const [step, setStep] = useState('check');
  const [url, setUrl]   = useState(DB.get('sync_url','')||'');
  const [key, setKey]   = useState(DB.get('sync_key','')||'');
  const [status, setStatus] = useState(Sync.getStatus());
  const [copied, setCopied] = useState(false);
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState('');
  useEffect(()=>{ if(Sync.isReady()) setStep('done'); return Sync.onStatus(s=>setStatus(s)); },[]);
  const copySQL = () => { navigator.clipboard.writeText(Sync.SQL).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }).catch(()=>{}); };
  const connect = async () => {
    if(!url.trim()||!key.trim()){ setErr('Please fill in both fields.'); return; }
    setErr(''); setTesting(true);
    const ok = await Sync.init(url.trim(), key.trim());
    setTesting(false);
    if(ok){ DB.set('sync_url', url.trim()); DB.set('sync_key', key.trim()); setStep('done'); onSynced && onSynced(); }
    else { setErr('Could not connect. Check your URL and anon key, and make sure you ran the SQL.'); }
  };
  const disconnect = () => { localStorage.removeItem('jny_sync_url'); localStorage.removeItem('jny_sync_key'); window.location.reload(); };
  const statusColor = {synced:'var(--ok)',syncing:'var(--gold-champ)',error:'var(--danger)',offline:'rgba(255,255,255,0.3)'};
  const statusText  = {synced:'Synced — data is live across devices',syncing:'Syncing…',error:'Sync error — check credentials',offline:'Not connected'};
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mtitle">☁ Sync Across Devices</div>
        {step==='done' ? (
          <>
            <div className={`sync-status-row ${status}`}>
              <div style={{width:10,height:10,borderRadius:'50%',background:statusColor[status],flexShrink:0}}/>
              <span style={{fontSize:'.83rem'}}>{statusText[status]}</span>
            </div>
            <p style={{fontSize:'.83rem',color:'var(--muted)',lineHeight:1.6,marginBottom:14}}>Your data is syncing automatically. Open the same URL on any device and it will stay in sync.</p>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btng btnsm" onClick={()=>Sync.pullAll()} style={{flex:1}}>Force Pull</button>
              <button className="btn btng btnsm" style={{flex:1,color:'var(--danger)',borderColor:'rgba(181,41,60,.3)'}} onClick={disconnect}>Disconnect</button>
            </div>
            <div className="macts"><button className="btn btnfull" onClick={onClose}>Close</button></div>
          </>
        ) : (
          <>
            <p style={{fontSize:'.83rem',color:'var(--muted)',lineHeight:1.6,marginBottom:16}}>Follow these steps to sync your Journey data across your phone and laptop for free. Takes about 5 minutes.</p>
            {[
              ['Create a free Supabase account','Go to supabase.com and click "Start your project". Sign up with GitHub or email (it\'s free).', null],
              ['Create a new project','Click "New project". Give it any name. Choose a region close to you. Wait ~2 minutes for it to start.', null],
              ['Run the setup SQL','In your Supabase project, click SQL Editor in the left sidebar, paste and run this:', Sync.SQL],
              ['Get your Project URL and anon key','In Supabase, go to Settings → API. Copy your Project URL and your anon / public key.', null],
            ].map(([title,desc,code],i)=>(
              <div key={i} className="step">
                <div className="step-num">{i+1}</div>
                <div className="step-body">
                  <div className="step-title">{title}</div>
                  <div className="step-desc">{desc}</div>
                  {code && <><div className={`code-box ${copied?'copied':''}`} onClick={copySQL}>{copied?'✓ Copied!':code}</div>
                    {!copied && <div style={{fontSize:'.7rem',color:'var(--muted)',marginTop:4}}>Tap the box above to copy</div>}</>}
                </div>
              </div>
            ))}
            <div className="step">
              <div className="step-num">5</div>
              <div className="step-body">
                <div className="step-title">Paste them below</div>
                <div className="frow" style={{marginTop:6}}><label className="flbl">Project URL</label><input className="inp inp-sm" placeholder="https://xxxx.supabase.co" value={url} onChange={e=>setUrl(e.target.value)}/></div>
                <div className="frow"><label className="flbl">Anon / Public Key</label><input className="inp inp-sm" placeholder="eyJhbGci..." value={key} onChange={e=>setKey(e.target.value)}/></div>
                {err && <div style={{fontSize:'.78rem',color:'var(--danger)',marginBottom:8}}>{err}</div>}
                <button className="btn btnfull" onClick={connect} disabled={testing}>{testing?'Connecting…':'Connect & Sync'}</button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── Setup screen ─── */
function Setup({onDone}){
  const [d,setD]=useState('');
  return(
    <div className="setup">
      <div className="setup-t">Journey</div>
      <p className="setup-s">Welcome. When did your journey begin?<br/>This sets your Day&nbsp;1.</p>
      <div className="setup-f">
        <label className="flbl" style={{textAlign:'left'}}>Journey Start Date</label>
        <input className="inp" type="date" value={d} onChange={e=>setD(e.target.value)} max={todayStr()} style={{textAlign:'center'}}/>
        <button className="btn btnfull" style={{background:'var(--red-garnet)'}} onClick={()=>d&&onDone(d)} disabled={!d}>Begin Journey →</button>
      </div>
    </div>
  );
}

/* ─── Donut Ring ─── */
function Donut({pct, size=88, thick=9, color, bg, label}){
  const c = color || 'var(--sec)';
  const b = bg || 'rgba(255,255,255,0.08)';
  const r=(size-thick)/2, circ=2*Math.PI*r;
  const dash=Math.min(pct,100)/100*circ;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={b} strokeWidth={thick}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={thick}
          strokeDasharray={dash+' '+circ} strokeLinecap="round"
          style={{transition:'stroke-dasharray .5s ease'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:size>70?'1.05rem':'.75rem',fontWeight:700,color:pct>0?c:'var(--muted)',lineHeight:1}}>{Math.round(pct)}%</div>
        {label&&<div style={{fontSize:'.55rem',color:'var(--muted)',marginTop:1,letterSpacing:'.06em',textTransform:'uppercase'}}>{label}</div>}
      </div>
    </div>
  );
}

/* ─── Daily ─── */
function DailyDay({dateStr, start, isToday, wgoals}){
  const [todos, setTodos] = useState([]);
  const [inp, setInp]     = useState('');
  const [sel, setSel]     = useState('');
  const [adding, setAdding] = useState(false);
  const color = isToday ? SEC.daily : '#3a2020';
  const color2 = isToday ? SEC2.daily : '#5a3030';

  useEffect(()=>{ setTodos(DB.get('todos_'+dateStr,[])); },[dateStr]);
  const save=u=>{ setTodos(u); DB.set('todos_'+dateStr,u); };
  const add=()=>{ if(!inp.trim()) return; save([...todos,{id:genId(),text:inp.trim(),done:false,wgid:sel||null}]); setInp(''); setSel(''); setAdding(false); };
  const toggle=id=>save(todos.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del=id=>save(todos.filter(t=>t.id!==id));

  const done=todos.filter(t=>t.done).length;
  const pct=todos.length?(done/todos.length)*100:0;
  const dateObj=new Date(dateStr+'T12:00:00');
  const dayName=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'][dateObj.getDay()];
  const dateLabel=dateObj.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'.');
  const isFuture=dateStr>todayStr();

  return(
    <div style={{
      minWidth:'82vw',maxWidth:340,flexShrink:0,
      background:isToday?'rgba(181,41,60,0.08)':'rgba(255,255,255,0.04)',
      border:'1px solid '+(isToday?'rgba(181,41,60,0.35)':'rgba(255,255,255,0.08)'),
      borderRadius:14,overflow:'hidden',display:'flex',flexDirection:'column',
      backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
    }}>
      <div style={{background:isToday?SEC.daily:'rgba(255,255,255,0.06)',padding:'12px 14px 10px',textAlign:'center'}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.1rem',fontWeight:700,color:'#fff',letterSpacing:'.12em',textTransform:'uppercase'}}>{dayName}</div>
        <div style={{fontSize:'.68rem',color:isToday?'rgba(255,255,255,.75)':'rgba(255,255,255,.45)',marginTop:2,letterSpacing:'.06em'}}>{dateLabel}</div>
      </div>
      <div style={{display:'flex',justifyContent:'center',padding:'16px 0 10px'}}>
        <Donut pct={pct} size={90} thick={9} color={color} bg={isToday?'rgba(181,41,60,0.15)':'rgba(255,255,255,0.06)'}/>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:14,padding:'0 14px 10px',fontSize:'.67rem',color:'var(--muted)'}}>
        <span style={{color:'var(--ok)'}}>✓ {done} Done</span>
        <span style={{color:SEC.daily}}>✕ {todos.length-done} Left</span>
      </div>
      <div style={{flex:1,padding:'0 12px 10px',overflowY:'auto',maxHeight:280}}>
        <div style={{fontSize:'.6rem',fontWeight:700,letterSpacing:'.12em',color:isToday?SEC2.daily:'rgba(255,255,255,0.35)',marginBottom:8,textTransform:'uppercase'}}>Tasks</div>
        {todos.length===0&&!isFuture&&(
          <div style={{fontSize:'.75rem',color:'var(--muted)',textAlign:'center',padding:'8px 0'}}>No tasks — tap + to add</div>
        )}
        {todos.map(t=>{
          const lg=wgoals.find(g=>g.id===t.wgid);
          return(
            <div key={t.id} style={{display:'flex',gap:8,alignItems:'flex-start',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
              <button
                style={{width:16,height:16,borderRadius:3,border:'1.5px solid '+(t.done?color:'rgba(255,255,255,0.25)'),
                  background:t.done?color:'none',cursor:'pointer',display:'flex',alignItems:'center',
                  justifyContent:'center',flexShrink:0,marginTop:1}}
                onClick={()=>toggle(t.id)}>
                {t.done&&<span style={{color:'#fff',fontSize:'.55rem',fontWeight:700}}>✓</span>}
              </button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'.78rem',lineHeight:1.35,textDecoration:t.done?'line-through':'none',
                  color:t.done?'var(--muted)':'var(--cream)'}}>{t.text}</div>
                {lg&&<div style={{fontSize:'.6rem',color:color2,marginTop:1}}>↳ {lg.text.slice(0,22)+(lg.text.length>22?'…':'')}</div>}
              </div>
              <button onClick={()=>del(t.id)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:'.8rem',opacity:.5,lineHeight:1}}>✕</button>
            </div>
          );
        })}
        {!isFuture&&adding?(
          <div style={{marginTop:8}}>
            <div style={{display:'flex',gap:6}}>
              <input autoFocus className="inp inp-sm" style={{flex:1,fontSize:'.78rem',padding:'6px 9px'}}
                placeholder="Task…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
              <button style={{background:color,color:'#fff',border:'none',borderRadius:7,padding:'6px 10px',cursor:'pointer',fontWeight:600,fontSize:'.78rem'}} onClick={add}>+</button>
            </div>
            {wgoals.length>0&&inp.trim()&&(
              <select className="inp inp-sm" value={sel} onChange={e=>setSel(e.target.value)} style={{width:'100%',marginTop:5,fontSize:'.72rem'}}>
                <option value="">— Link to weekly goal (optional) —</option>
                {wgoals.map(g=><option key={g.id} value={g.id}>{g.text}</option>)}
              </select>
            )}
          </div>
        ):!isFuture&&(
          <button onClick={()=>setAdding(true)}
            style={{marginTop:8,width:'100%',background:'rgba(181,41,60,0.08)',border:'1px dashed rgba(181,41,60,0.28)',
              borderRadius:7,padding:'6px',color:color2,fontSize:'.75rem',cursor:'pointer',letterSpacing:'.05em'}}>
            + Add Task
          </button>
        )}
      </div>
      <div style={{borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',fontSize:'.65rem',color:'var(--muted)'}}>

function GoalList({skey,label,full,isplan,note,type,period,start}){
  const [goals,setGoals]=useState([]);
  const [inp,setInp]=useState('');
  const [linked,setLinked]=useState({});
  useEffect(()=>{ setGoals(DB.get(skey,[])); },[skey]);
  useEffect(()=>{
    if(type!=='week'||!start||!period) return;
    const counts={};
    weekDays(start,period).forEach(dk=>{ const ts=DB.get('todos_'+dk,[]); ts.forEach(t=>{ if(t.wgid){ if(!counts[t.wgid]) counts[t.wgid]={tot:0,done:0}; counts[t.wgid].tot++; if(t.done) counts[t.wgid].done++; } }); });
    setLinked(counts);
  },[type,period,start,goals]);
  const save=g=>{ setGoals(g); DB.set(skey,g); };
  const add=()=>{ if(!inp.trim()) return; save([...goals,{id:genId(),text:inp.trim(),measurable:isMeas(inp),done:false}]); setInp(''); };
  const toggle=id=>save(goals.map(g=>g.id===id?{...g,done:!g.done}:g));
  const del=id=>{ if(full) save(goals.filter(g=>g.id!==id)); };
  let tpct=0,mc=0;
  goals.forEach(g=>{ if(!g.measurable) return; mc++; const lk=linked[g.id]; if(lk&&lk.tot>0) tpct+=(lk.done/lk.tot)*100; else if(g.done) tpct+=100; });
  const nm=goals.filter(g=>!g.measurable),nmd=nm.filter(g=>g.done).length;
  const ovr=goals.length===0?0:mc>0?(tpct/mc+(nm.length>0?(nmd/nm.length)*100:0))/(mc>0&&nm.length>0?2:1):nm.length>0?(nmd/nm.length)*100:0;
  return(
    <div>
      <div className={'pbanner '+(isplan?'plan':'lock')}>
        <span className="pb-ico">{isplan?'📋':'🔒'}</span>
        <div>
          <div className={'pb-hd '+(isplan?'gld':'mu')}>{isplan?'Planning Day':'Mid-period — Light Edits Only'}</div>
          <div className="pb-bd">{note}</div>
        </div>
      </div>
      <div className="card">
        <div className="ctitle">◎ {label} Goals</div>
        {goals.length>0&&<PBar pct={ovr} label="Overall progress"/>}
        {goals.length===0&&<div className="empty"><div className="eico">🎯</div><div className="etxt">{isplan?`Set your goals for ${label}`:`No goals set for ${label} yet`}</div></div>}
        {goals.map(g=>{ const lk=linked[g.id],lkp=lk&&lk.tot>0?(lk.done/lk.tot)*100:null; return(
          <div key={g.id} className="gitem">
            {!g.measurable&&<button className={'tchk'+(g.done?' on':'')} onClick={()=>toggle(g.id)} aria-label="toggle">
              {g.done&&<span style={{color:'#fff',fontSize:'.68rem',fontWeight:700}}>✓</span>}</button>}
            {g.measurable&&<div style={{width:20,flexShrink:0}}/>}
            <div style={{flex:1}}>
              <div style={{fontSize:'.88rem',lineHeight:1.4,textDecoration:g.done&&!g.measurable?'line-through':'none',color:g.done&&!g.measurable?'var(--muted)':'var(--cream)'}}>{g.text}</div>
              <div style={{display:'flex',gap:5,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
                <span className={'mbdg '+(g.measurable?'y':'n')}>{g.measurable?'◉ measurable':'◌ not measurable'}</span>
                {g.measurable&&lk&&lk.tot>0&&<span style={{fontSize:'.66rem',color:'var(--sec2)'}}>{lk.done}/{lk.tot} tasks done</span>}
              </div>
              {g.measurable&&lkp!==null&&<div style={{marginTop:4}}><div className="pwrap" style={{height:3}}><div className="pbar" style={{width:lkp+'%'}}/></div></div>}
            </div>
            {full?<button className="tdel" onClick={()=>del(g.id)}>✕</button>:<div style={{width:22}}/>}
          </div>);})}
        <div className="row">
          <input className="inp" placeholder={full?'Add a goal…':'Add a goal (light edit)…'} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <button className="btn" onClick={add}>+</button>
        </div>
        {inp.trim()&&<div className={'hint '+(isMeas(inp)?'ok':'mu')}>{isMeas(inp)?'◉ Measurable — progress tracked':'◌ Not measurable — tick manually'}</div>}
      </div>
    </div>
  );
}

      evs=[...evs,{id:'keith_weekly',title:'Weekly Meeting — Keith',st:'19:00',et:'20:00',type:'meeting',rec:'sun',dk:null}];
      DB.set('calevents',evs);
    }

  },[]);

  const evOn=dk=>events.filter(e=>e.rec==='sun'?new Date(dk+'T12:00:00').getDay()===0:e.dk===dk);
  const first=new Date(yr,mo,1).getDay(),last=new Date(yr,mo+1,0).getDate(),prev=new Date(yr,mo,0).getDate();
  const cells=[];
  for(let i=first-1;i>=0;i--) cells.push({d:prev-i,cur:false});
  for(let d=1;d<=last;d++) cells.push({d,cur:true});
  while(cells.length%7!==0) cells.push({d:cells.length-last-first+1,cur:false});
  const navMo=dir=>{ let m=mo+dir,y=yr; if(m<0){m=11;y--;}if(m>11){m=0;y++;} setMo(m);setYr(y); };
  const addEv=()=>{ if(!form.title.trim()) return; saveEvs([...events,{id:genId(),...form,dk:sel}]); setForm({title:'',st:'',et:'',type:'event',rec:'none'}); setModal(false); };
  const selEvs=evOn(sel);

            <div key={i} className={`cday${!c.cur?' oth':''}${isTdy?' today':''}${isSel&&!isTdy?' sel':''}${hasE?' hase':''}`} onClick={()=>c.cur&&setSel(dk)}>{c.d}</div>);})}
        </div>
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
          <div className="ctitle" style={{marginBottom:0}}>{selLbl}</div>
          <button className="btn btnsm" onClick={()=>setModal(true)}>+ Event</button>
        </div>
        {selEvs.length===0&&<div className="empty" style={{padding:'14px 0'}}><div className="etxt">No events — tap + to add one</div></div>}
        {selEvs.map(ev=>(
          <div key={ev.id} className="evitem">
            <div className="evtime">{ev.st||'—'}{ev.et&&<><br/><span style={{opacity:.6}}>{ev.et}</span></>}</div>
            <div style={{flex:1}}>
              <div className="evtit">{ev.title}</div>
              {ev.rec==='sun'&&<div style={{fontSize:'.66rem',color:'var(--sec2)',marginTop:2}}>↻ Weekly (Sundays)</div>}
              {ev.type==='deadline'&&<div style={{fontSize:'.66rem',color:'var(--danger)',marginTop:2}}>⚑ Deadline</div>}
            </div>
            <button className="evdel" onClick={()=>saveEvs(events.filter(e=>e.id!==ev.id))}>✕</button>
          </div>))}
      </div>
      {modal&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="mtitle">Add Event — {selLbl}</div>
            <div className="frow"><label className="flbl">Title</label><input className="inp" placeholder="Event title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
            <div className="grid2" style={{marginBottom:11}}>
              <div><label className="flbl">Start</label><input className="inp inp-sm" type="time" value={form.st} onChange={e=>setForm({...form,st:e.target.value})}/></div>
              <div><label className="flbl">End</label><input className="inp inp-sm" type="time" value={form.et} onChange={e=>setForm({...form,et:e.target.value})}/></div>

/* ─── Habits Tracker ─── */
const DEFAULT_HABITS = ['Wake up on time','Exercise','Read / Learn','Prayer / Devotion','No social media','Drink water','Sleep on time'];

function HabitsTab(){
  const now = new Date();
  const [yr,setYr]   = useState(now.getFullYear());
  const [mo,setMo]   = useState(now.getMonth());
  const [habits,setHabits] = useState([]);
  const [checks,setChecks] = useState({});
  const [newHab,setNewHab] = useState('');
  const [showAdd,setShowAdd] = useState(false);

  const moKey = `${yr}-${String(mo+1).padStart(2,'0')}`;
  const daysInMo = new Date(yr,mo+1,0).getDate();
  const todayD = now.getFullYear()===yr && now.getMonth()===mo ? now.getDate() : (now.getFullYear()>yr||(now.getFullYear()===yr&&now.getMonth()>mo)?daysInMo+1:0);

  useEffect(()=>{
    const h = DB.get('habits_list', DEFAULT_HABITS.map((t,i)=>({id:'h'+i,text:t})));
    setHabits(h);
    setChecks(DB.get('habits_checks_'+moKey,{}));
  },[moKey]);

  const saveHabits = h=>{ setHabits(h); DB.set('habits_list',h); };
  const saveChecks = c=>{ setChecks(c); DB.set('habits_checks_'+moKey,c); };

  const toggle = (hid,day)=>{
    if(day>todayD) return;
    const k=hid+'_'+day;
    const nc={...checks,[k]:!checks[k]};
    if(!nc[k]) delete nc[k];
    saveChecks(nc);
  };

  const addHabit=()=>{ if(!newHab.trim()) return; saveHabits([...habits,{id:genId(),text:newHab.trim()}]); setNewHab(''); setShowAdd(false); };
  const delHabit=id=>saveHabits(habits.filter(h=>h.id!==id));
  const navMo=dir=>{ let m=mo+dir,y=yr; if(m<0){m=11;y--;}if(m>11){m=0;y++;} setMo(m);setYr(y); };

  const weeks=[];
  for(let d=1;d<=daysInMo;d+=7) weeks.push({wk:Math.ceil(d/7),days:Array.from({length:Math.min(7,daysInMo-d+1)},(_,i)=>d+i)});

  const habStats = habits.map(h=>{
    const possible = Math.min(daysInMo, todayD-1+(todayD<=daysInMo?1:0));
    const done = Object.keys(checks).filter(k=>k.startsWith(h.id+'_')&&checks[k]).length;
    return {id:h.id, done, possible};
  });

  const wkPcts = weeks.map(({wk,days})=>{
    const pastDays = days.filter(d=>d<=todayD);
    if(!pastDays.length||!habits.length) return null;
    const total = pastDays.length * habits.length;
    const done  = pastDays.reduce((s,d)=>s+habits.filter(h=>checks[h.id+'_'+d]).length, 0);
    return Math.round((done/total)*100);
  });

  const monthDone = habStats.reduce((s,h)=>s+h.done,0);
  const monthPoss = habStats.reduce((s,h)=>s+h.possible,0);
  const monthPct  = monthPoss>0?Math.round((monthDone/monthPoss)*100):0;

  const dayName = d => { const dt=new Date(yr,mo,d); return DAYS[dt.getDay()].slice(0,1); };

  return(
    <div className="sec">
      <div className="card" style={{padding:'9px 13px',marginBottom:11}}>
        <div className="dnav">
          <button className="dnbtn" onClick={()=>navMo(-1)}>‹</button>
          <div className="dlbl">{MONTHS[mo]} {yr} — {monthPct}% complete</div>
          <button className="dnbtn" onClick={()=>navMo(1)} disabled={yr===now.getFullYear()&&mo===now.getMonth()} style={{opacity:yr===now.getFullYear()&&mo===now.getMonth()?.35:1}}>›</button>
        </div>
      </div>
      <div className="card" style={{padding:'12px 0 8px'}}>
        <div style={{padding:'0 14px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div className="ctitle" style={{marginBottom:0}}>☑ Habit Tracker</div>
          <button className="btn btnsm" onClick={()=>setShowAdd(v=>!v)}>+ Habit</button>
        </div>
        {showAdd&&(
          <div style={{padding:'0 14px 10px',display:'flex',gap:7}}>
            <input className="inp inp-sm" placeholder="New habit…" value={newHab} autoFocus
              onChange={e=>setNewHab(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addHabit()}/>
            <button className="btn btnsm" onClick={addHabit}>Add</button>
          </div>
        )}
        <div className="hab-wrap">
          <table className="hab-tbl">
            <thead>
              <tr>
                <th className="hab-name" style={{fontSize:'.58rem',color:'var(--muted)',fontWeight:600,paddingBottom:2,letterSpacing:'.08em',textTransform:'uppercase'}}>My Habits</th>
                {weeks.map(({wk,days})=><th key={wk} className="hab-wh" colSpan={days.length}>Wk {wk}</th>)}
              </tr>
              <tr>
                <th className="hab-name" style={{paddingTop:2}}></th>
                {weeks.flatMap(({days})=>days.map(d=>(
                  <th key={d} className="hab-dh">
                    <div style={{color:d===todayD?SEC.habits:'',fontWeight:d===todayD?700:400}}>{d}</div>
                    <div style={{fontSize:'.48rem',opacity:.6}}>{dayName(d)}</div>
                  </th>
                )))}
              </tr>
            </thead>
            <tbody>
              {habits.map(h=>(
                <tr key={h.id}>
                  <td className="hab-name">
                    <span style={{cursor:'pointer',opacity:.5}} onClick={()=>delHabit(h.id)} title="tap to remove">✕ </span>
                    {h.text}
                  </td>
                  {weeks.flatMap(({days})=>days.map(d=>(
                    <td key={d} className="hab-c">
                      <button className={`hck ${checks[h.id+'_'+d]?'on':''} ${d>todayD?'fut':''}`}
                        onClick={()=>toggle(h.id,d)}>
                        {checks[h.id+'_'+d]?'✓':''}
                      </button>
                    </td>
                  )))}
                </tr>
              ))}
              <tr className="hab-prow">
                <td className="hab-name">Progress</td>
                {weeks.map(({wk,days},wi)=>(
                  <td key={wk} colSpan={days.length} style={{textAlign:'center',fontSize:'.65rem',
                    color:wkPcts[wi]!==null?(wkPcts[wi]>=80?'var(--ok)':wkPcts[wi]>=50?SEC2.habits:'var(--danger)'):'var(--muted)',
                    fontWeight:600,paddingTop:4,borderTop:'1px solid rgba(255,255,255,0.08)'}}>
                    {wkPcts[wi]!==null?wkPcts[wi]+'%':'—'}
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="ctitle">Analysis</div>
        <div className="anl-grid">
          <div className="anl-h">Habit</div>
          <div className="anl-h" style={{textAlign:'center'}}>Goal</div>
          <div className="anl-h" style={{textAlign:'center'}}>Done</div>
          <div className="anl-h">Progress</div>
          {habits.map(h=>{
            const st=habStats.find(s=>s.id===h.id)||{done:0,possible:0};
            const pct=st.possible>0?Math.round((st.done/st.possible)*100):0;
            const barCls=pct>=80?'':pct>=50?'warn':'bad';
            return(<React.Fragment key={h.id}>
              <div className="anl-c" style={{fontSize:'.76rem',borderBottom:'1px solid rgba(255,255,255,.04)'}}>{h.text}</div>
              <div className="anl-c" style={{justifyContent:'center',borderBottom:'1px solid rgba(255,255,255,.04)'}}>{st.possible}</div>
              <div className="anl-c" style={{justifyContent:'center',borderBottom:'1px solid rgba(255,255,255,.04)'}}>{st.done}</div>
              <div className="anl-c" style={{gap:6,borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <div className="anl-bar-wrap"><div className={`anl-bar ${barCls}`} style={{width:pct+'%'}}/></div>
                <span style={{fontSize:'.65rem',color:'var(--muted)',flexShrink:0,width:28,textAlign:'right'}}>{pct}%</span>
              </div>
            </React.Fragment>);
          })}
        </div>
        <div style={{marginTop:12,display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,0.05)',borderRadius:8,padding:'10px 12px',border:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:'.68rem',color:'var(--muted)',marginBottom:4,letterSpacing:'.08em',textTransform:'uppercase'}}>Overall Month Progress</div>
            <div className="anl-bar-wrap" style={{height:7}}><div className="anl-bar" style={{width:monthPct+'%'}}/></div>
          </div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.4rem',color:'var(--sec2)',fontWeight:600}}>{monthPct}%</div>
        </div>
      </div>
    </div>
  );
}

function SmallDonut({pct,color='#C4963A',size=56}){
  const thick=6,r=(size-thick)/2,circ=2*Math.PI*r,dash=Math.min(pct,100)/100*circ;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={thick}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={thick}
          strokeDasharray={dash+' '+circ} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'.58rem',fontWeight:700,color:pct>0?color:'var(--muted)'}}>
        {Math.round(pct)}%
      </div>
    </div>
  );
}

function BudgetTab(){
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [sub,setSub]=useState('overview');
  const [budgets,setBudgets]=useState({});
  const [income,setIncome]=useState({salary:'',other:'',other2:''});
  const [txs,setTxs]=useState([]);
  const [form,setForm]=useState({desc:'',amount:'',catId:'groceries',type:'expense',date:todayStr()});
  const [showForm,setShowForm]=useState(false);
  const [savingGoal,setSavingGoal]=useState('');
  const moKey=yr+'-'+String(mo+1).padStart(2,'0');
  useEffect(()=>{
    setBudgets(DB.get('bud_budgets_'+moKey,{}));
    setIncome(DB.get('bud_income_'+moKey,{salary:'',other:'',other2:''}));
    setTxs(DB.get('bud_txs_'+moKey,[]));
    setSavingGoal(DB.get('bud_saving_goal',''));
  },[moKey]);
  const saveBudgets=b=>{setBudgets(b);DB.set('bud_budgets_'+moKey,b);};
  const saveIncome=v=>{setIncome(v);DB.set('bud_income_'+moKey,v);};
  const saveTxs=t=>{setTxs(t);DB.set('bud_txs_'+moKey,t);};
  const navMo=dir=>{let m=mo+dir,y=yr;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setMo(m);setYr(y);};
  const totalIncome=(parseFloat(income.salary)||0)+(parseFloat(income.other)||0)+(parseFloat(income.other2)||0);
  const expenseTxs=txs.filter(t=>t.type==='expense');
  const totalSpent=expenseTxs.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const savings=totalIncome-totalSpent;
  const savGoalNum=parseFloat(savingGoal)||0;
  const spentByCat=cid=>expenseTxs.filter(t=>t.catId===cid).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const totalBudgeted=BUD_CATS.reduce((s,c)=>s+(parseFloat(budgets[c.id])||0),0);
  const overallPct=totalBudgeted>0?Math.min(100,(totalSpent/totalBudgeted)*100):0;
  const fp=n=>`£${(parseFloat(n)||0).toFixed(2)}`;
  const f2=n=>n<0?`-£${Math.abs(n).toFixed(2)}`:`£${n.toFixed(2)}`;
  const addTx=()=>{
    if(!form.desc.trim()||!form.amount) return;
    saveTxs([{id:genId(),...form,amount:parseFloat(form.amount)},...txs]);
    setForm({desc:'',amount:'',catId:'groceries',type:'expense',date:todayStr()});
    setShowForm(false);
  };
  const getMonthSpent=m=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); return DB.get('bud_txs_'+mk,[]).filter(x=>x.type==='expense').reduce((s,x)=>s+(parseFloat(x.amount)||0),0); };
  const getMonthIncome=m=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); const inc=DB.get('bud_income_'+mk,{salary:'',other:'',other2:''}); return (parseFloat(inc.salary)||0)+(parseFloat(inc.other)||0)+(parseFloat(inc.other2)||0); };
  const getMonthCatSpent=(m,cid)=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); return DB.get('bud_txs_'+mk,[]).filter(x=>x.type==='expense'&&x.catId===cid).reduce((s,x)=>s+(parseFloat(x.amount)||0),0); };

  return(
    <div className="sec">
      <div className="card" style={{padding:'9px 13px',marginBottom:11}}>
        <div className="dnav">
          <button className="dnbtn" onClick={()=>navMo(-1)}>‹</button>
          <div className="dlbl">{FULL_MONTHS[mo]} {yr}</div>
          <button className="dnbtn" onClick={()=>navMo(1)}>›</button>
        </div>
      </div>
      <div className="stabs">
        {[['overview','Overview'],['monthly','Monthly'],['annual','Annual'],['income','Income'],['transactions','Transactions']].map(([id,lbl])=>(
          <button key={id} className={'stab'+(sub===id?' on':'')} onClick={()=>setSub(id)}>{lbl}</button>
        ))}
      </div>

      {sub==='overview'&&(
        <>
          <div className="bsum">
            <div className="bstat"><div className="bnum neu">{fp(totalIncome)}</div><div className="blbl">Income</div></div>
            <div className="bstat"><div className="bnum neg">{fp(totalSpent)}</div><div className="blbl">Spent</div></div>
            <div className="bstat"><div className={`bnum ${savings>=0?'pos':'neg'}`}>{f2(savings)}</div><div className="blbl">Left</div></div>
          </div>
          <div className="card">
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:12}}>
              <Donut pct={overallPct} size={80} thick={8} color={overallPct>90?SEC.daily:overallPct>75?SEC.budget:SEC.budget} label="budget"/>
              <div style={{flex:1}}>
                <div style={{fontSize:'.82rem',fontWeight:600,marginBottom:4,letterSpacing:'.04em'}}>Budget Overview</div>
                <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:8}}>{fp(totalSpent)} spent of {fp(totalBudgeted)} budgeted</div>
                {savGoalNum>0&&(
                  <div>
                    <div style={{fontSize:'.68rem',color:'var(--muted)',marginBottom:3}}>Saving Goal: {fp(savGoalNum)}</div>
                    <div className="pwrap"><div className="pbar" style={{width:Math.min(100,(savings/savGoalNum)*100)+'%'}}/></div>
                    <div style={{fontSize:'.68rem',color:'var(--ok)',marginTop:2}}>{fp(Math.max(0,savings))} saved ({Math.round(Math.min(100,(savings/savGoalNum)*100))}%)</div>
                  </div>
                )}
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
              <button className="btn btnsm" onClick={()=>setShowForm(v=>!v)}>+ Transaction</button>
            </div>
            {showForm&&(
              <div style={{background:'rgba(255,255,255,0.04)',borderRadius:10,padding:12,marginBottom:12,border:'1px solid rgba(255,255,255,0.10)'}}>
                <div style={{fontSize:'.75rem',fontWeight:600,color:'var(--sec2)',marginBottom:10,letterSpacing:'.08em',textTransform:'uppercase'}}>Add Transaction</div>
                <div style={{display:'flex',gap:6,marginBottom:10}}>
                  {['expense','income'].map(t=>(

                <div className="grid2" style={{marginBottom:10}}>

                  <div><label className="flbl">Date</label><input className="inp inp-sm" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>

                    </div>
                    {bud>0&&(<div style={{height:3,background:'rgba(255,255,255,0.07)',borderRadius:99,overflow:'hidden'}}>
                      <div style={{height:'100%',width:pct+'%',background:over?SEC.daily:pct>75?SEC.budget:cat.color,borderRadius:99,transition:'width .4s'}}/></div>)}

      {sub==='monthly'&&(
        <div className="card">

            {Array.from({length:12},(_,m)=>{
              const spent=getMonthSpent(m);

                <div key={m} onClick={()=>{setMo(m);setSub('overview');}}

                    textAlign:'center',cursor:'pointer',border:isThisMo?'1px solid rgba(196,150,58,0.35)':'1px solid rgba(255,255,255,0.08)'}}>
                  <div style={{fontSize:'.65rem',fontWeight:600,color:isThisMo?SEC.budget:'var(--muted)',marginBottom:7,textTransform:'uppercase',letterSpacing:'.08em'}}>{MONTH_NAMES[m]}</div>
                  <div style={{display:'flex',justifyContent:'center',marginBottom:5}}>
                    <SmallDonut pct={pct} color={pct>90?SEC.daily:pct>75?SEC.budget:SEC.budget} size={50}/>
                  </div>
                  <div style={{fontSize:'.63rem',color:'var(--muted)'}}>£{spent.toFixed(0)}</div>

            <div className="ctitle" style={{marginBottom:8}}>📊 Annual Budget — {yr}</div>

              <button className="btn btng btnsm" onClick={()=>setYr(y=>y-1)}>{yr-1}</button>
              <button className="btn btng btnsm" onClick={()=>setYr(y=>y+1)}>{yr+1}</button>
            </div>

            <table style={{borderCollapse:'collapse',fontSize:'.68rem',whiteSpace:'nowrap',width:'100%',minWidth:700}}>

                <tr style={{background:SEC.budget}}>

                  <th style={{padding:'7px 8px',textAlign:'center',fontWeight:600,letterSpacing:'.06em'}}>YEAR</th>
                </tr>

              <tbody>
                <tr style={{background:'rgba(80,160,120,.12)'}}>
                  <td colSpan={14} style={{padding:'5px 10px',fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--ok)',position:'sticky',left:0,background:'rgba(80,160,120,.12)'}}>REVENUE</td>

                      <td style={{padding:'5px 8px',textAlign:'center',fontWeight:600,color:'var(--ok)'}}>£{total.toFixed(0)}</td>
                    </tr>
