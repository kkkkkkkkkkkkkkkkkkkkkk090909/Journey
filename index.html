                <tr style={{background:'rgba(80,160,120,.08)',borderTop:'1px solid rgba(80,160,120,.2)'}}>
                  <td style={{padding:'6px 10px',fontWeight:700,color:'var(--ok)',position:'sticky',left:0,background:'rgba(80,160,120,.10)'}}>Total Income</td>
                  {Array.from({length:12},(_,m)=>{ const v=getMonthIncome(m); return <td key={m} style={{padding:'6px 8px',textAlign:'center',fontWeight:600,color:'var(--ok)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>; })}
                  <td style={{padding:'6px 8px',textAlign:'center',fontWeight:700,color:'var(--ok)'}}>£{Array.from({length:12},(_,m)=>getMonthIncome(m)).reduce((s,v)=>s+v,0).toFixed(0)}</td>
                </tr>
                <tr style={{background:'rgba(181,41,60,.10)'}}>
                  <td colSpan={14} style={{padding:'5px 10px',fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--danger)',position:'sticky',left:0,background:'rgba(181,41,60,.10)'}}>EXPENSES</td>
                </tr>
                {BUD_CATS.map((cat,i)=>{
                  const yearly=Array.from({length:12},(_,m)=>getMonthCatSpent(m,cat.id));
                  const total=yearly.reduce((s,v)=>s+v,0);
                  return(
                    <tr key={cat.id} style={{background:i%2===0?'rgba(255,255,255,0.03)':'transparent'}}>
                      <td style={{padding:'5px 10px',position:'sticky',left:0,background:i%2===0?'rgba(22,15,12,0.95)':'rgba(22,15,12,0.90)',zIndex:1}}>{cat.ico} {cat.name}</td>
                      {yearly.map((v,m)=><td key={m} style={{padding:'5px 8px',textAlign:'center',color:v>0?'var(--cream)':'var(--muted)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>)}
                      <td style={{padding:'5px 8px',textAlign:'center',fontWeight:600,color:total>0?cat.color:'var(--muted)'}}>{total>0?'£'+total.toFixed(0):'—'}</td>
                    </tr>
                  );
                })}
                <tr style={{background:'rgba(181,41,60,.08)',borderTop:'1px solid rgba(181,41,60,.2)'}}>
                  <td style={{padding:'6px 10px',fontWeight:700,color:'var(--danger)',position:'sticky',left:0,background:'rgba(181,41,60,.10)'}}>Total Expenses</td>
                  {Array.from({length:12},(_,m)=>{ const v=getMonthSpent(m); return <td key={m} style={{padding:'6px 8px',textAlign:'center',fontWeight:600,color:'var(--danger)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>; })}
                  <td style={{padding:'6px 8px',textAlign:'center',fontWeight:700,color:'var(--danger)'}}>£{Array.from({length:12},(_,m)=>getMonthSpent(m)).reduce((s,v)=>s+v,0).toFixed(0)}</td>
                </tr>
                <tr style={{background:'rgba(196,150,58,.08)',borderTop:'1px solid rgba(196,150,58,.15)'}}>
                  <td style={{padding:'6px 10px',fontWeight:700,color:SEC.budget,position:'sticky',left:0,background:'rgba(196,150,58,.10)'}}>💰 Net Savings</td>
                  {Array.from({length:12},(_,m)=>{ const v=getMonthIncome(m)-getMonthSpent(m); return <td key={m} style={{padding:'6px 8px',textAlign:'center',fontWeight:600,color:v>=0?'var(--ok)':'var(--danger)'}}>{getMonthIncome(m)>0?(v>=0?'+':'')+'£'+Math.abs(v).toFixed(0):'—'}</td>; })}
                  <td style={{padding:'6px 8px',textAlign:'center',fontWeight:700,color:SEC.budget}}>{(()=>{const v=Array.from({length:12},(_,m)=>getMonthIncome(m)-getMonthSpent(m)).reduce((s,x)=>s+x,0); return (v>=0?'+':'')+'£'+Math.abs(v).toFixed(0);})()}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}

      {sub==='income'&&(
        <div className="card">
          <div className="ctitle">💷 Income — {FULL_MONTHS[mo]}</div>
          {[['salary','Salary / Main Income'],['other','Other Income'],['other2','Additional Income']].map(([k,lbl])=>(
            <div className="frow" key={k}><label className="flbl">{lbl} (£)</label>
              <input className="inp" type="number" placeholder="0.00" value={income[k]} onChange={e=>saveIncome({...income,[k]:e.target.value})}/></div>
          ))}
          <div style={{background:'rgba(196,150,58,0.08)',borderRadius:8,padding:'10px 12px',display:'flex',justifyContent:'space-between',marginBottom:12,border:'1px solid rgba(196,150,58,0.20)'}}>
            <span style={{fontSize:'.82rem',color:'var(--muted)',letterSpacing:'.04em'}}>Total Income</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.2rem',color:SEC.budget,fontWeight:600}}>{fp(totalIncome)}</span>
          </div>
          <div className="frow"><label className="flbl">Monthly Saving Goal (£)</label>
            <input className="inp" type="number" placeholder="0.00" value={savingGoal}
              onChange={e=>{setSavingGoal(e.target.value);DB.set('bud_saving_goal',e.target.value);}}/></div>
          <div style={{height:1,background:'rgba(255,255,255,0.08)',margin:'14px 0'}}/>
          <div className="ctitle" style={{marginBottom:10}}>Category Budgets — {FULL_MONTHS[mo]}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {BUD_CATS.map(cat=>(
              <div key={cat.id} style={{background:'rgba(255,255,255,0.04)',borderRadius:8,padding:'9px 10px',border:'1px solid rgba(255,255,255,0.08)'}}>
                <div style={{fontSize:'.7rem',fontWeight:600,marginBottom:5,color:'var(--cream)',letterSpacing:'.04em'}}>{cat.ico} {cat.name}</div>
                <input className="inp inp-sm" type="number" placeholder="£ budget" value={budgets[cat.id]||''}
                  onChange={e=>saveBudgets({...budgets,[cat.id]:e.target.value})} style={{padding:'6px 9px',fontSize:'.78rem'}}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {sub==='transactions'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
            <div className="ctitle" style={{marginBottom:0}}>Transactions — {FULL_MONTHS[mo]}</div>
            <button className="btn btnsm" onClick={()=>{setSub('overview');setShowForm(true);}}>+ Add</button>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:10,fontSize:'.75rem'}}>
            <div style={{flex:1,background:'rgba(80,160,120,.08)',border:'1px solid rgba(80,160,120,.2)',borderRadius:7,padding:'7px 10px',textAlign:'center'}}>
              <div style={{color:'var(--ok)',fontWeight:600}}>{fp(txs.filter(t=>t.type==='income').reduce((s,t)=>s+(parseFloat(t.amount)||0),0))}</div>
              <div style={{color:'var(--muted)',fontSize:'.62rem',letterSpacing:'.06em',textTransform:'uppercase'}}>Income</div>
            </div>
            <div style={{flex:1,background:'rgba(181,41,60,.08)',border:'1px solid rgba(181,41,60,.2)',borderRadius:7,padding:'7px 10px',textAlign:'center'}}>
              <div style={{color:'var(--danger)',fontWeight:600}}>{fp(totalSpent)}</div>
              <div style={{color:'var(--muted)',fontSize:'.62rem',letterSpacing:'.06em',textTransform:'uppercase'}}>Expenses</div>
            </div>
          </div>
          {txs.length===0&&<div className="empty"><div className="eico">📋</div><div className="etxt">No transactions yet</div></div>}
          {txs.map(t=>{
            const cat=BUD_CATS.find(c=>c.id===t.catId)||BUD_CATS[BUD_CATS.length-1];
            return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <span style={{fontSize:'1rem',flexShrink:0}}>{cat.ico}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'.83rem'}}>{t.desc}</div>
                  <div style={{fontSize:'.65rem',color:'var(--muted)',letterSpacing:'.04em'}}>{cat.name} · {t.date}</div>
                </div>
                <span style={{fontWeight:600,flexShrink:0,color:t.type==='income'?'var(--ok)':'var(--cream)'}}>{t.type==='income'?'+':'-'}{fp(t.amount)}</span>
                <button onClick={()=>saveTxs(txs.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:'.85rem',opacity:.4}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── Settings Modal ─── */
function SettingsModal({start, onClose, onUpdateStart}){
  const [nd, setNd] = useState(start||'');
  const [saved, setSaved] = useState(false);
  const doSave = () => {
    if(!nd) return;
    DB.set('start', nd); onUpdateStart(nd); setSaved(true);
    setTimeout(()=>{ setSaved(false); onClose(); }, 900);
  };
  const pd  = nd ? calcDay(nd)    : null;
  const pwk = nd ? calcWeek(nd)   : null;
  const pm  = nd ? calcMonth(nd)  : null;
  const py  = pd ? calcYear(pd)   : null;
  const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : 'Not set';
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mtitle">⚙ Settings</div>
        <div style={{background:'rgba(196,150,58,0.08)',borderRadius:10,padding:'11px 13px',marginBottom:14,border:'1px solid rgba(196,150,58,0.20)'}}>
          <div style={{fontSize:'.62rem',color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.1em'}}>Journey Start Date</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.05rem',color:SEC.budget,fontWeight:600}}>{fmtDate(start)}</div>
          {start&&(
            <div style={{fontSize:'.75rem',color:'var(--muted)',marginTop:5,display:'flex',gap:12,flexWrap:'wrap'}}>
              <span style={{color:'var(--cream)'}}>Day {calcDay(start)}</span>
              <span style={{color:'var(--cream)'}}>Wk {calcWeek(start)}</span>
              <span style={{color:'var(--cream)'}}>Mo {calcMonth(start)}</span>
              <span style={{color:'var(--cream)'}}>Yr {calcYear(calcDay(start))}</span>
            </div>
          )}
        </div>
        <div className="frow"><label className="flbl">Correct Start Date</label>
          <input className="inp" type="date" value={nd} max={todayStr()} onChange={e=>setNd(e.target.value)}/></div>
        {pd&&nd!==start&&(
          <div style={{background:'rgba(181,41,60,0.08)',border:'1px solid rgba(181,41,60,0.22)',borderRadius:9,padding:'10px 13px',marginBottom:12}}>
            <div style={{fontSize:'.68rem',color:SEC2.daily,marginBottom:6,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase'}}>Preview with new date:</div>
            <div style={{display:'flex',gap:16,fontSize:'.82rem',flexWrap:'wrap'}}>
              <span>Day <strong>{pd}</strong></span>
              <span>Week <strong>{pwk}</strong></span>
              <span>Month <strong>{pm}</strong></span>
              <span>Year <strong>{py}</strong></span>
            </div>
          </div>
        )}
        <div className="macts">
          <button className="btn btng" onClick={onClose} style={{flex:1}}>Cancel</button>
          <button className="btn" onClick={doSave} disabled={!nd||nd===start||saved} style={{flex:1}}>{saved?'Saved!':'Save & Apply'}</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Tab config ─── */
const TABS=[
  {id:'daily', ico:'✦', lbl:'Today',    nav:'nav-daily'},
  {id:'goals', ico:'◎', lbl:'Goals',    nav:'nav-goals'},
  {id:'habits',ico:'☑', lbl:'Habits',   nav:'nav-habits'},
  {id:'budget',ico:'£', lbl:'Budget',   nav:'nav-budget'},
  {id:'bible', ico:'✝', lbl:'Scripture',nav:'nav-bible'},
  {id:'affirm',ico:'☀', lbl:'Affirm',   nav:'nav-affirm'},
  {id:'cal',   ico:'◻', lbl:'Calendar', nav:'nav-cal'},
  {id:'meet',  ico:'◈', lbl:'Meeting',  nav:'nav-meet'},
];

/* ─── App Root ─── */
function App(){
  const [tab,setTab]=useState('daily');
  const [start,setStart]=useState(undefined);
  const [syncReady,setSyncReady]=useState(false);
  const [syncStatus,setSyncStatus]=useState('offline');
  const [showSync,setShowSync]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [bgTheme,setBgTheme]=useState(()=>DB.get('bg_theme','midnight'));

  useEffect(()=>{
    Sync.onStatus(setSyncStatus);
    const initApp = async () => {
      const syncUrl = DB.get('sync_url',null);
      const syncKey = DB.get('sync_key',null);
      if(syncUrl && syncKey) await Sync.init(syncUrl, syncKey);
      setStart(DB.get('start', null));
      setSyncReady(true);
    };
    initApp();
  },[]);

  const onSetup = d => { DB.set('start',d); setStart(d); };
  const onUpdateStart = d => setStart(d);
  const setBg = id => { setBgTheme(id); DB.set('bg_theme',id); };

  const bgMap = { midnight:'#131823', western:'#1E110A', crimson:'#180808', alpine:'#0D1518' };

  if(!syncReady) return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:14,background:'#131823'}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'2rem',color:'#E8C87A',letterSpacing:'.14em',textTransform:'uppercase'}}>Journey</div>
      <div style={{fontSize:'.78rem',color:'rgba(255,255,255,0.38)',letterSpacing:'.08em',textTransform:'uppercase'}}>{syncStatus==='syncing'?'Syncing your data…':'Loading…'}</div>
      <div style={{width:120,height:2,background:'rgba(255,255,255,0.08)',borderRadius:99,overflow:'hidden'}}>
        <div style={{height:'100%',background:'#C4963A',borderRadius:99,animation:'load 1.2s ease infinite'}}/>
      </div>
      <style>{`@keyframes load{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:120px}}`}</style>
    </div>
  );

  if(!start) return <Setup onDone={onSetup}/>;

  const dn=calcDay(start),wn=calcWeek(start),mn=calcMonth(start),yn=calcYear(dn);

  return(
    <div className="app" style={{background:bgMap[bgTheme]||'#131823',transition:'background .5s ease'}}>
      <header className="hdr">
        <div className="hdr-t">Journey</div>
        <div className="hdr-r">
          <div className="chips">
            <span className="chip">Day {dn}</span>
            <span className="chip">Wk {wn}</span>
            <span className="chip">Mo {mn}</span>
            <span className="chip">Yr {yn}</span>
          </div>
          <div className={'syncdot '+syncStatus} onClick={()=>setShowSync(true)}
            title={syncStatus==='synced'?'Synced':syncStatus==='syncing'?'Syncing…':syncStatus==='error'?'Sync error':'Tap to set up sync'}/>
          <button onClick={()=>setShowSettings(true)}
            style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.38)',fontSize:'.72rem',
              padding:'2px 4px',lineHeight:1,letterSpacing:'.08em',fontFamily:"'DM Sans',sans-serif",textTransform:'uppercase'}}>
            Settings
          </button>
        </div>
      </header>

      {/* Background switcher */}
      <div className="bg-picker">
        {[
          {id:'midnight',label:'Night',   bg:'#131823'},
          {id:'western', label:'Ember',   bg:'#1E110A'},
          {id:'crimson', label:'Crimson', bg:'#180808'},
          {id:'alpine',  label:'Alpine',  bg:'#0D1518'},
        ].map(t=>(
          <div key={t.id} className={`bg-btn${bgTheme===t.id?' active':''}`}
            style={{background:t.bg}} onClick={()=>setBg(t.id)}>
            <span>{t.label}</span>
          </div>
        ))}
      </div>

      <main className={`main tab-${tab}`}>
        {tab==='daily'  && <DailyTab  dn={dn} wn={wn} mn={mn} yn={yn} start={start}/>}
        {tab==='goals'  && <GoalsTab  dn={dn} wn={wn} mn={mn} yn={yn} start={start}/>}
        {tab==='habits' && <HabitsTab/>}
        {tab==='budget' && <BudgetTab/>}
        {tab==='bible'  && <BibleTab/>}
        {tab==='affirm' && <AffirmTab/>}
        {tab==='cal'    && <CalTab/>}
        {tab==='meet'   && <MeetTab wn={wn}/>}
      </main>

      <nav className="bnav">
        {TABS.map(t=>(
          <button key={t.id} className={`nbtn ${t.nav}${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>
            <span className="nico" style={tab===t.id?{color:SEC[t.id]}:{}}>{t.ico}</span>
            <span>{t.lbl}</span>
          </button>))}
      </nav>

      {showSync && <SyncModal onClose={()=>setShowSync(false)} onSynced={()=>setShowSync(false)}/>}
      {showSettings && <SettingsModal start={start} onClose={()=>setShowSettings(false)} onUpdateStart={onUpdateStart}/>}
    </div>
  );
}

/* ─── Error Boundary ─── */
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={error:null}; }
  static getDerivedStateFromError(e){ return {error:e}; }
  render(){
    if(this.state.error){
      return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',padding:24,textAlign:'center',background:'#131823',color:'rgba(255,255,255,0.92)',fontFamily:"'DM Sans',sans-serif"}},
        React.createElement('div',{style:{fontSize:'2rem',marginBottom:12}},'⚠️'),
        React.createElement('div',{style:{fontSize:'1rem',fontWeight:600,marginBottom:8,color:'#E8C87A',letterSpacing:'.08em',textTransform:'uppercase'}},'Something went wrong'),
        React.createElement('div',{style:{fontSize:'.8rem',color:'rgba(255,255,255,0.38)',marginBottom:16,maxWidth:280,lineHeight:1.6}},'Try refreshing the page. If it keeps happening, clear your browser cache and reload.'),
        React.createElement('div',{style:{fontSize:'.7rem',color:'rgba(255,255,255,0.25)',fontFamily:'monospace',background:'rgba(0,0,0,0.4)',padding:'8px 12px',borderRadius:6,maxWidth:'90%',wordBreak:'break-all'}},this.state.error.toString()),
        React.createElement('button',{onClick:()=>window.location.reload(),style:{marginTop:16,background:'#B5293C',color:'#fff',border:'none',borderRadius:8,padding:'10px 20px',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:600,letterSpacing:'.06em'}},'Reload')
      );
    }
    return this.props.children;
  }
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(ErrorBoundary, null, React.createElement(App))
  );
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#131823;color:rgba(255,255,255,0.92);font-family:sans-serif;text-align:center;padding:24px"><div style="font-size:2rem;margin-bottom:12px">⚠️</div><div style="font-size:1rem;color:#E8C87A;margin-bottom:8px">Failed to start</div><div style="font-size:.8rem;color:rgba(255,255,255,0.38);margin-bottom:16px">Try refreshing the page.</div><button onclick="location.reload()" style="background:#B5293C;color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:.9rem">Reload</button></div>';
}
</script>
</body>
</html>
